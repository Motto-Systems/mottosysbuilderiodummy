<div class="new-popupTitle">
    <h1 mat-dialog-title>An error has occurred!</h1>
    <div class="popup-close" align="right">
        <!-- <app-icon [iconType]="'CLOSE'" (click)="close()"></app-icon> -->
    </div>
</div>

<div mat-dialog-content>
    <div class="mt-3 mb-3 ml-3 mr-2 pr-2 ml-sm-0 mr-sm-0 modal-over">
    <p>
        <b>Status Code: {{data.status}}</b>
    </p>
    <p>
        Something went wrong!
    </p>
    <p class="error-message">
        {{data?.message}}
    </p>
    <div>
        <b>Detail Description</b>
        <p>
            {{data?.description}}
        </p>
    </div>
</div>

    <button mat-raised-button mat-dialog-close color="primary" (click)="close()">
        Close
    </button>
</div> -->
</div>

<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">



  <title>dd</title>




  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }


    body {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100vw;
      height: 100vh;
      background: #00897B;
      background-blend-mode: multiply;
    }




    .box {
      width: 550px;
      height: 100px;
      /* background: var(--mhighc);*/
      background: none;
      display: flex;
      justify-content: center;
      align-items: center;
      /* box-shadow: 4px 4px 20px rgba(0, 0, 0, 0.3);*/
      border-bottom: 1px solid #165E7F;
    }

    .container {
      height: 15px;
      width: 105px;
      display: flex;
      position: relative;
    }

    .container .circle {
      width: 15px;
      height: 15px;
      border-radius: 50%;
      /*background-color: var(--mbase);*/
      background-color: #165E7F;
      animation: move 500ms linear 0ms infinite;
      margin-right: 30px;
    }

    .container .circle:first-child {
      position: absolute;
      top: 0;
      left: 0;
      animation: grow 500ms linear 0ms infinite;
    }

    .container .circle:last-child {
      position: absolute;
      top: 0;
      right: 0;
      margin-right: 0;
      animation: grow 500ms linear 0s infinite reverse;
    }

    @keyframes grow {
      from {
        transform: scale(0, 0);
        opacity: 0;
      }

      to {
        transform: scale(1, 1);
        opacity: 1;
      }
    }

    @keyframes move {
      from {
        transform: translateX(0px);
      }

      to {
        transform: translateX(45px);
      }
    }

    .redirectiontext {
      color: #ffffff;
      width: 550px;
      margin-top: 20px;
      text-align: center;
      line-height: 1.5;
    }

    .redirectiontext span {
      font-weight: 600;
      font-size: 25px;
    }



    .header-t {
      width: 100%;
      height: 60px;
      background-color: #00897B;
      box-shadow: 0px 3px 6px 0px #D0D5DD;
      -webkit-box-shadow: 0px 3px 6px 0px #D0D5DD;
      -moz-box-shadow: 0px 3px 6px 0px #D0D5DD;
      z-index: 99999;
      line-height: 60px;
      position: absolute;
      top: 0px;
    }

    .gmplogo {
      display: inline-block;
      line-height: 60px;
      vertical-align: middle;
    }

    .gmplogo img {
      padding-top: 15px;
      padding-left: 30px;
    }


    .login-main {
      width: 100%;
      height: 100%;
    }

    .login-form {
      width: 360px;
      text-align: center;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #D4E6FE;
      padding: 20px 30px 30px;
      border-radius: 15px;
    }

    .login-form input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
    }

    .login-form button {
      border: none;
      padding: 10px;
      width: 100%;
      background: #00897B;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
      position: relative;
      margin-top: 20px;
    }

    .login-form button #loader-07 {
      position: absolute;
      top: 4px;
      left: 45%;
    }
  </style>

  <script>
    window.console = window.console || function (t) { };
  </script>



  <script>
    if (document.location.search.match(/type=embed/gi)) {
      window.parent.postMessage("resize", "*");
    }
  </script>


</head>

<body translate="no">

  <div class="header-t ">

    <ul>
      <li class="gmplogo" alt="GMP Pro">
        <img src="assets/img/GMPProLogo.png">
      </li>







    </ul>


  </div>

  @if (!isProd) {
  <div class="login-main">
    <form [formGroup]="loginForm" autocomplete="nope">
      <div class="login-form">
        <input type="text" formControlName="userName" placeholder="User Name">
        <input type="password" formControlName="password" autocomplete="new-password" placeholder="Password">
        <button btnLoader (click)="login()">Log In</button>
      </div>
    </form>
  </div>
  }

  @if (isProd) {
  <div>
    <div class="box">
      <div class="container">
        <span class="circle"></span>
        <span class="circle"></span>
        <span class="circle"></span>
        <span class="circle"></span>
      </div>
    </div>
    <div class="redirectiontext">Redirecting to<br /><span>{{appName}}</span><br />Application, Please
      wait...</div>
  </div>
  }
</body>

</html>
